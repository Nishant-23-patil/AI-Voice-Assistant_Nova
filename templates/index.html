<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nova — AI Voice Assistant</title>
  <style>
    :root {
      --bg: #0a0e1a;
      --panel: #0f1628;
      --border: #1e2d4a;
      --accent: #00d4ff;
      --accent2: #7c3aed;
      --text: #e2e8f0;
      --muted: #64748b;
      --user-bubble: #1e2d4a;
      --nova-bubble: #0d1f3c;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
 
    /* ── Header ── */
    header {
      width: 100%;
      max-width: 720px;
      padding: 18px 20px 12px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid var(--border);
    }
    .logo-ring {
      width: 42px; height: 42px;
      border-radius: 50%;
      border: 2px solid var(--accent);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 12px rgba(0,212,255,.35);
      flex-shrink: 0;
    }
    .logo-ring svg { width: 22px; height: 22px; fill: var(--accent); }
    h1 { font-size: 1.3rem; font-weight: 700; letter-spacing: .03em; }
    h1 span { color: var(--accent); }
    .status-dot {
      margin-left: auto;
      width: 9px; height: 9px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 6px #22c55e;
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
 
    /* ── Chat area ── */
    #chat {
      flex: 1;
      width: 100%;
      max-width: 720px;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      scroll-behavior: smooth;
    }
    #chat::-webkit-scrollbar { width: 5px; }
    #chat::-webkit-scrollbar-track { background: transparent; }
    #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
 
    .msg {
      max-width: 82%;
      padding: 11px 15px;
      border-radius: 14px;
      font-size: .93rem;
      line-height: 1.55;
      word-break: break-word;
    }
    .msg.user {
      background: var(--user-bubble);
      border: 1px solid var(--border);
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }
    .msg.nova {
      background: var(--nova-bubble);
      border: 1px solid rgba(0,212,255,.15);
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }
    .msg .label {
      font-size: .72rem;
      font-weight: 600;
      letter-spacing: .06em;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .msg.user .label { color: #94a3b8; }
    .msg.nova .label { color: var(--accent); }
 
    /* Typing indicator */
    .typing-dots span {
      display: inline-block;
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--accent);
      margin: 0 2px;
      animation: bounce .9s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: .15s; }
    .typing-dots span:nth-child(3) { animation-delay: .30s; }
    @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }
 
    /* ── Input bar ── */
    footer {
      width: 100%;
      max-width: 720px;
      padding: 12px 16px 18px;
      border-top: 1px solid var(--border);
    }
    .input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }
    #textInput {
      flex: 1;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-size: .92rem;
      padding: 11px 14px;
      resize: none;
      outline: none;
      min-height: 44px;
      max-height: 130px;
      overflow-y: auto;
      transition: border-color .2s;
    }
    #textInput:focus { border-color: var(--accent); }
    #textInput::placeholder { color: var(--muted); }
 
    button {
      width: 44px; height: 44px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .2s, transform .1s;
      flex-shrink: 0;
    }
    button:active { transform: scale(.93); }
    #sendBtn {
      background: var(--accent);
      color: #000;
    }
    #sendBtn:hover { background: #33ddff; }
    #micBtn {
      background: var(--panel);
      border: 1px solid var(--border);
      color: var(--text);
    }
    #micBtn:hover { border-color: var(--accent); color: var(--accent); }
    #micBtn.listening {
      background: rgba(239,68,68,.15);
      border-color: #ef4444;
      color: #ef4444;
      animation: micpulse 1s infinite;
    }
    @keyframes micpulse { 0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.4)} 50%{box-shadow:0 0 0 8px rgba(239,68,68,0)} }
 
    .hint {
      font-size: .73rem;
      color: var(--muted);
      margin-top: 7px;
      text-align: center;
    }
    .hint kbd {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1px 5px;
      font-size: .72rem;
    }
 
    /* No-speech notice */
    #speechNotice {
      display: none;
      font-size: .75rem;
      color: #f59e0b;
      text-align: center;
      margin-top: 6px;
    }
  </style>
</head>
<body>
 
<header>
  <div class="logo-ring">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M12 2a10 10 0 1 0 0 20A10 10 0 0 0 12 2zm0 3a1.5 1.5 0 1 1 0 3 1.5 1.5 0 0 1 0-3zm-3 5h6l-1.5 7H10.5L9 10z"/>
    </svg>
  </div>
  <div>
    <h1><span>Nova</span> AI Assistant</h1>
  </div>
  <div class="status-dot" title="Online"></div>
</header>
 
<div id="chat">
  <div class="msg nova">
    <div class="label">Nova</div>
    Hello! I'm Nova, your AI voice assistant. You can type or use the 🎤 mic button to talk to me. Try asking me the time, a joke, or anything you like!
  </div>
</div>
 
<footer>
  <div class="input-row">
    <textarea id="textInput" placeholder="Type a message…" rows="1"></textarea>
    <button id="micBtn" title="Hold to speak">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="9" y="2" width="6" height="12" rx="3"/>
        <path d="M5 10a7 7 0 0 0 14 0"/>
        <line x1="12" y1="19" x2="12" y2="22"/>
        <line x1="8" y1="22" x2="16" y2="22"/>
      </svg>
    </button>
    <button id="sendBtn" title="Send">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/>
        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>
  <div class="hint">Press <kbd>Enter</kbd> to send &nbsp;·&nbsp; <kbd>Shift+Enter</kbd> for new line</div>
  <div id="speechNotice">⚠️ Voice not supported in this browser. Please type your message.</div>
</footer>
 
<script>
  const chat    = document.getElementById('chat');
  const input   = document.getElementById('textInput');
  const sendBtn = document.getElementById('sendBtn');
  const micBtn  = document.getElementById('micBtn');
  const notice  = document.getElementById('speechNotice');
 
  // ── Auto-resize textarea ──
  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 130) + 'px';
  });
 
  // ── Add message bubble ──
  function addMsg(who, text) {
    const div = document.createElement('div');
    div.className = `msg ${who}`;
    div.innerHTML = `<div class="label">${who === 'user' ? 'You' : 'Nova'}</div>${escHtml(text)}`;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return div;
  }
 
  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
 
  // ── Typing indicator ──
  function showTyping() {
    const div = document.createElement('div');
    div.className = 'msg nova';
    div.id = 'typing';
    div.innerHTML = `<div class="label">Nova</div><div class="typing-dots"><span></span><span></span><span></span></div>`;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }
  function hideTyping() {
    const t = document.getElementById('typing');
    if (t) t.remove();
  }
 
  // ── TTS ──
  function speak(text) {
    if (!window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    const utt = new SpeechSynthesisUtterance(text);
    utt.rate = 1.05;
    utt.pitch = 1.0;
    // Try a female voice
    const voices = speechSynthesis.getVoices();
    const female = voices.find(v => /female|zira|samantha|google uk english female/i.test(v.name));
    if (female) utt.voice = female;
    speechSynthesis.speak(utt);
  }
 
  // Voices may not load immediately
  if (window.speechSynthesis) speechSynthesis.onvoiceschanged = () => {};
 
  // ── Send message ──
  async function send(text) {
    text = text.trim();
    if (!text) return;
 
    addMsg('user', text);
    input.value = '';
    input.style.height = 'auto';
    showTyping();
 
    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text })
      });
      const data = await res.json();
      hideTyping();
      const reply = data.reply || data.error || 'Something went wrong.';
      addMsg('nova', reply);
      speak(reply);
    } catch (err) {
      hideTyping();
      addMsg('nova', 'Connection error. Make sure the server is running.');
    }
  }
 
  sendBtn.addEventListener('click', () => send(input.value));
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(input.value); }
  });
 
  // ── Speech-to-Text (Web Speech API) ──
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    micBtn.disabled = true;
    micBtn.style.opacity = '.4';
    notice.style.display = 'block';
  } else {
    const recog = new SpeechRecognition();
    recog.lang = 'en-IN';
    recog.interimResults = false;
    recog.maxAlternatives = 1;
 
    recog.onresult = e => {
      const transcript = e.results[0][0].transcript;
      send(transcript);
    };
    recog.onstart  = () => micBtn.classList.add('listening');
    recog.onend    = () => micBtn.classList.remove('listening');
    recog.onerror  = () => micBtn.classList.remove('listening');
 
    micBtn.addEventListener('click', () => {
      if (micBtn.classList.contains('listening')) {
        recog.stop();
      } else {
        recog.start();
      }
    });
  }
</script>
</body>
</html>
